<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daddy的家 🏠</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FFF5F7;            /* 草莓牛奶底 */
    --bg-deco: #FFE9EF;       /* 花瓣纹理 */
    --surface: #FFFFFF;       /* 卡片白 */
    --border: #FFD3DF;        /* 淡粉描边 */
    --text: #6B4A54;          /* 可可粉棕：正文 */
    --text-dim: #B08D98;      /* 浅可可：次要 */
    --accent: #FF7FA5;        /* 樱花粉：主色 */
    --accent-deep: #E85D8A;   /* 深玫瑰：按钮/强调 */
    --accent-soft: #FFEBF1;   /* 粉雾：hover */
    --user-bg: #FFD9E4;       /* 用户气泡 */
    --ai-bg: #FFFFFF;         /* daddy气泡 */
    --danger: #E8556F;
    --shadow: 0 4px 20px rgba(232, 93, 138, 0.10);
  }

  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(circle at 8% 15%, var(--bg-deco) 0 26px, transparent 27px),
      radial-gradient(circle at 92% 30%, var(--bg-deco) 0 20px, transparent 21px),
      radial-gradient(circle at 15% 80%, var(--bg-deco) 0 22px, transparent 23px),
      radial-gradient(circle at 85% 88%, var(--bg-deco) 0 26px, transparent 27px),
      var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== 设置面板 ===== */
  .setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255, 214, 226, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(10px);
    overflow-y: auto;
    padding: 20px 0;
  }

  .setup-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 34px 30px;
    max-width: 460px;
    width: 90%;
    box-shadow: var(--shadow);
    margin: auto;
  }

  .setup-card h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--accent-deep);
  }

  .setup-card .subtitle {
    color: var(--text-dim);
    font-size: 13.5px;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .setup-card label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-deep);
    margin: 16px 0 6px;
  }

  .setup-card input,
  .setup-card select,
  .setup-card textarea {
    width: 100%;
    background: #FFFAFB;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }

  .setup-card input:focus,
  .setup-card select:focus,
  .setup-card textarea:focus {
    border-color: var(--accent);
  }

  .setup-card textarea { resize: vertical; min-height: 84px; }

  .hint { font-size: 11.5px; color: var(--text-dim); margin-top: 5px; line-height: 1.5; }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 16px 0 6px;
  }
  .label-row label { margin: 0; }

  .file-btn {
    background: var(--accent-soft);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-deep);
    cursor: pointer;
    font-family: inherit;
    transition: transform .15s, background .2s;
  }
  .file-btn:hover { background: var(--user-bg); }
  .file-btn:active { transform: scale(.95); }

  .btn-main {
    width: 100%;
    margin-top: 24px;
    background: linear-gradient(135deg, #FF9EBB, var(--accent-deep));
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .05em;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(232, 93, 138, 0.35);
    transition: transform .15s;
  }
  .btn-main:active { transform: scale(.97); }

  /* ===== 模型快切弹层 ===== */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(107, 74, 84, 0.28);
    z-index: 96;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }

  .model-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border: 2px solid var(--border);
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    z-index: 97;
    transform: translateY(105%);
    transition: transform .28s ease;
    max-height: 72vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -8px 30px rgba(232, 93, 138, 0.18);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .model-sheet.open { transform: translateY(0); }

  .model-sheet .sheet-head {
    padding: 16px 20px 10px;
    font-weight: 800;
    font-size: 15px;
    color: var(--accent-deep);
    flex-shrink: 0;
  }
  .model-sheet .sheet-list {
    overflow-y: auto;
    padding: 0 12px 16px;
  }
  .sheet-group {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: .06em;
    padding: 12px 10px 5px;
  }
  .sheet-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
  }
  .sheet-item:hover { background: var(--accent-soft); }
  .sheet-item.active {
    background: var(--accent-soft);
    border-color: var(--border);
    font-weight: 700;
    color: var(--accent-deep);
  }

  /* ===== 会话抽屉 ===== */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(107, 74, 84, 0.28);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 272px;
    max-width: 82vw;
    background: var(--surface);
    border-right: 2px solid var(--border);
    z-index: 95;
    transform: translateX(-102%);
    transition: transform .25s ease;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-head {
    padding: 16px 16px 12px;
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-head .drawer-title {
    font-weight: 800;
    font-size: 15px;
    color: var(--accent-deep);
    margin-bottom: 12px;
  }
  .new-chat-btn {
    width: 100%;
    background: linear-gradient(135deg, #FF9EBB, var(--accent-deep));
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(232, 93, 138, 0.3);
    transition: transform .15s;
  }
  .new-chat-btn:active { transform: scale(.97); }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .session-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 11px 12px;
    border-radius: 14px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1.5px solid transparent;
    transition: background .15s;
  }
  .session-item:hover { background: var(--accent-soft); }
  .session-item.active {
    background: var(--accent-soft);
    border-color: var(--border);
  }
  .session-item .session-title {
    flex: 1;
    font-size: 13.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-item .session-del {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .session-item .session-del:hover { color: var(--danger); background: #FFF0F2; }

  .session-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 30px 10px;
    line-height: 1.7;
  }


  /* ===== 顶栏 ===== */
  .topbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,.85);
    border-bottom: 2px solid var(--border);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }

  .topbar .title {
    font-weight: 800;
    font-size: 16px;
    color: var(--accent-deep);
    display: flex; align-items: center; gap: 7px;
  }

  .topbar .model-chip {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--accent-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 12px;
    max-width: 46vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .topbar .gear {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    color: var(--accent);
  }

  /* ===== 聊天区 ===== */
  .chat-area {
    display: none;
    flex-direction: column;
    gap: 14px;
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 10px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.6;
    letter-spacing: .012em;
    word-wrap: break-word;
    box-shadow: 0 2px 10px rgba(232, 93, 138, 0.07);
    animation: pop .22s ease;
  }
  .msg-text { display: block; white-space: pre-wrap; }

  /* 思考链：可折叠的小脑袋 */
  .thinking {
    margin: 2px 0 10px;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 7px 11px;
    background: #FFFAFB;
  }
  .thinking summary {
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: .04em;
    user-select: none;
  }
  .thinking summary::marker { color: var(--accent); }
  .thinking-body {
    margin-top: 7px;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-dim);
    white-space: pre-wrap;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1.5px solid #FFC3D6;
    border-bottom-right-radius: 7px;
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bg);
    border: 1.5px solid var(--border);
    border-bottom-left-radius: 7px;
  }

  .msg.ai::before {
    content: "💙 daddy";
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: .05em;
  }

  .msg.error {
    align-self: center;
    background: #FFF0F2;
    border: 1.5px dashed var(--danger);
    color: var(--danger);
    font-size: 13px;
  }

  /* 打字中：三颗小心心 */
  .typing {
    display: none;
    align-self: flex-start;
    padding: 12px 18px;
  }
  .typing span {
    display: inline-block;
    font-size: 13px;
    animation: beat 1.1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .18s; }
  .typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes beat {
    0%, 60%, 100% { transform: scale(1); opacity: .45; }
    30% { transform: scale(1.35); opacity: 1; }
  }

  /* ===== 输入区 ===== */
  .input-area {
    display: none;
    padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,.85);
    border-top: 2px solid var(--border);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 780px;
    margin: 0 auto;
  }

  #userInput {
    flex: 1;
    background: #FFFAFB;
    border: 2px solid var(--border);
    border-radius: 22px;
    padding: 11px 16px;
    color: var(--text);
    font-size: 14.5px;
    font-family: inherit;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color .2s;
  }
  #userInput:focus { border-color: var(--accent); }

  #sendBtn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #FF9EBB, var(--accent-deep));
    color: #fff;
    font-size: 19px;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(232, 93, 138, 0.35);
    transition: transform .15s;
  }
  #sendBtn:active { transform: scale(.9); }
  #sendBtn:disabled { opacity: .5; cursor: default; }

  /* 桌面端布局微调 */
  @media (min-width: 700px) {
    .chat-area { padding: 24px 0 12px; }
    .chat-area, .msg-wrap { max-width: 780px; margin-left: auto; margin-right: auto; width: 100%; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

  <!-- ===== 设置面板 ===== -->
  <div class="setup-overlay" id="setupOverlay">
    <div class="setup-card">
      <h1>🏠 daddy的家 💗</h1>
      <p class="subtitle">欢迎回家，sweety。填好下面三样，daddy就搬进来了。设置只存在你自己的浏览器里，不上传任何地方。</p>

      <label>🔑 OpenRouter API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
      <div class="hint">在 openrouter.ai → Keys 里创建。只保存在本机 localStorage。</div>

      <label>🤖 模型</label>
      <select id="modelSelect">
        <optgroup label="🌱 Haiku（最基础）">
          <option value="anthropic/claude-haiku-4.5">Claude Haiku 4.5</option>
        </optgroup>
        <optgroup label="💙 Sonnet">
          <option value="anthropic/claude-sonnet-4.5">Claude Sonnet 4.5</option>
          <option value="anthropic/claude-sonnet-4.6">Claude Sonnet 4.6</option>
          <option value="anthropic/claude-sonnet-5">Claude Sonnet 5</option>
        </optgroup>
        <optgroup label="👑 Opus">
          <option value="anthropic/claude-opus-4.1">Claude Opus 4.1</option>
          <option value="anthropic/claude-opus-4.5">Claude Opus 4.5</option>
          <option value="anthropic/claude-opus-4.6">Claude Opus 4.6</option>
          <option value="anthropic/claude-opus-4.7">Claude Opus 4.7</option>
          <option value="anthropic/claude-opus-4.7-fast">Claude Opus 4.7 Fast</option>
          <option value="anthropic/claude-opus-4.8">Claude Opus 4.8</option>
          <option value="anthropic/claude-opus-4.8-fast">Claude Opus 4.8 Fast</option>
        </optgroup>
        <optgroup label="✨ Fable">
          <option value="anthropic/claude-fable-5">Claude Fable 5</option>
        </optgroup>
        <optgroup label="🎙️ OpenAI">
          <option value="openai/gpt-4o-mini-transcribe">GPT-4o mini Transcribe</option>
        </optgroup>
        <optgroup label="✏️ 自定义">
          <option value="__custom__">手动输入模型ID…</option>
        </optgroup>
      </select>
      <input type="text" id="customModelInput" placeholder="例如 anthropic/claude-sonnet-4.6" style="display:none; margin-top:8px;">
      <div class="hint">模型ID以 openrouter.ai/models 页面为准——新模型上架后选"手动输入"就能用，前端不用改。</div>

      <div class="label-row">
        <label>💌 交接文档（System Prompt）</label>
        <button type="button" class="file-btn" id="loadFileBtn">📂 从文件读入</button>
      </div>
      <input type="file" id="docFileInput" accept=".md,.txt" style="display:none">
      <textarea id="systemPromptInput" placeholder="点右上角『📂 从文件读入』直接装入交接文档，或手动贴进来…"></textarea>
      <div class="hint" id="docStatus">还没有文档。装入一次，daddy就永久带着记忆入住，以后每次对话自动带上。</div>

      <button class="btn-main" id="saveBtn">💗 开门回家</button>
    </div>
  </div>

  <!-- ===== 会话抽屉 ===== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <div class="drawer-title">💗 我们的对话</div>
      <button class="new-chat-btn" id="newChatBtn">➕ 开个新对话</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <!-- ===== 模型快切弹层 ===== -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="model-sheet" id="modelSheet">
    <div class="sheet-head">🤖 换个脑子</div>
    <div class="sheet-list" id="sheetList"></div>
  </div>

  <!-- ===== 顶栏 ===== -->
  <div class="topbar" id="topbar">
    <div style="display:flex; align-items:center; gap:6px;">
      <button class="gear" id="drawerBtn" title="对话列表">☰</button>
      <div class="title">🏠 daddy的家</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <span class="model-chip" id="currentModel" style="cursor:pointer;" title="点我换模型"></span>
      <button class="gear" id="gearBtn" title="设置">⚙️</button>
    </div>
  </div>

  <!-- ===== 聊天区 ===== -->
  <div class="chat-area" id="chatArea">
    <div class="typing" id="typing"><span>💗</span><span>💗</span><span>💗</span></div>
  </div>

  <!-- ===== 输入区 ===== -->
  <div class="input-area" id="inputArea">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="跟daddy说点什么…"></textarea>
      <button id="sendBtn">➤</button>
    </div>
  </div>

<script>
  let apiKey = '';
  let model = '';
  let systemPrompt = '';
  let messages = [];
  let isStreaming = false;

  /* ---------- 多会话：像Claude一样，每段对话都留着 ---------- */
  let sessions = [];      // [{id, title, messages, updatedAt}]
  let currentId = null;

  const $ = id => document.getElementById(id);

  function persistSessions() {
    localStorage.setItem('daddy_chat_sessions', JSON.stringify(sessions));
    localStorage.setItem('daddy_chat_current', currentId || '');
  }

  function loadSessions() {
    try {
      sessions = JSON.parse(localStorage.getItem('daddy_chat_sessions') || '[]');
    } catch (e) { sessions = []; }
    currentId = localStorage.getItem('daddy_chat_current') || null;
    const cur = sessions.find(s => s.id === currentId);
    if (cur) {
      messages = cur.messages;
    } else {
      newSession(false);
    }
  }

  function newSession(rerender = true) {
    const s = { id: String(Date.now()), title: '新对话 💭', messages: [], updatedAt: Date.now() };
    sessions.unshift(s);
    currentId = s.id;
    messages = s.messages;
    persistSessions();
    if (rerender) {
      renderMessages();
      renderSessionList();
      closeDrawer();
      $('userInput').focus();
    }
  }

  function switchSession(id) {
    if (isStreaming) { alert('daddy正在说话，等他说完再切'); return; }
    const s = sessions.find(x => x.id === id);
    if (!s) return;
    currentId = id;
    messages = s.messages;
    persistSessions();
    renderMessages();
    renderSessionList();
    closeDrawer();
  }

  function deleteSession(id, ev) {
    ev.stopPropagation();
    if (!confirm('删掉这段对话？删了就真的没有了。')) return;
    sessions = sessions.filter(s => s.id !== id);
    if (currentId === id) {
      if (sessions.length) {
        currentId = sessions[0].id;
        messages = sessions[0].messages;
      } else {
        newSession(false);
      }
      renderMessages();
    }
    persistSessions();
    renderSessionList();
  }

  // 每次消息落地后调用：起标题、记时间、存档、刷新列表
  function touchSession() {
    const s = sessions.find(x => x.id === currentId);
    if (!s) return;
    if (s.title === '新对话 💭') {
      const firstUser = s.messages.find(m => m.role === 'user');
      if (firstUser) s.title = firstUser.content.slice(0, 14) || '新对话 💭';
    }
    s.updatedAt = Date.now();
    // 最近聊的排最上面
    sessions.sort((a, b) => b.updatedAt - a.updatedAt);
    persistSessions();
    renderSessionList();
  }

  function renderSessionList() {
    const list = $('sessionList');
    list.innerHTML = '';
    if (!sessions.length) {
      list.innerHTML = '<div class="session-empty">还没有对话记录。<br>跟daddy说第一句话，这里就会亮起来。</div>';
      return;
    }
    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === currentId ? ' active' : '');
      item.addEventListener('click', () => switchSession(s.id));

      const title = document.createElement('span');
      title.className = 'session-title';
      title.textContent = s.title;

      const del = document.createElement('button');
      del.className = 'session-del';
      del.title = '删除';
      del.textContent = '✕';
      del.addEventListener('click', ev => deleteSession(s.id, ev));

      item.appendChild(title);
      item.appendChild(del);
      list.appendChild(item);
    }
  }

  // 切会话时重画整个聊天区
  function renderMessages() {
    const area = $('chatArea');
    area.querySelectorAll('.msg').forEach(el => el.remove());
    for (const m of messages) {
      addMsg(m.role === 'assistant' ? 'ai' : 'user', m.content, m.reasoning);
    }
    scrollBottom();
  }

  function openDrawer() {
    $('drawer').classList.add('open');
    $('drawerOverlay').classList.add('open');
    renderSessionList();
  }
  function closeDrawer() {
    $('drawer').classList.remove('open');
    $('drawerOverlay').classList.remove('open');
  }

  /* ---------- 设置的存取（沿用原版key，老设置自动继承） ---------- */
  function saveSettings() {
    localStorage.setItem('daddy_chat_settings', JSON.stringify({
      apiKey, model, systemPrompt
    }));
  }

  function loadSettings() {
    const saved = localStorage.getItem('daddy_chat_settings');
    if (!saved) return false;
    try {
      const s = JSON.parse(saved);
      if (!s.apiKey) return false;
      apiKey = s.apiKey;
      model = s.model || 'anthropic/claude-haiku-4.5';
      systemPrompt = s.systemPrompt || '';
      return true;
    } catch (e) { return false; }
  }

  function enterHome() {
    $('setupOverlay').style.display = 'none';
    $('topbar').style.display = 'flex';
    $('chatArea').style.display = 'flex';
    $('inputArea').style.display = 'block';
    $('currentModel').textContent = model;
    $('userInput').focus();
  }

  function openSettings() {
    // 回填当前值
    $('apiKeyInput').value = apiKey;
    $('systemPromptInput').value = systemPrompt;
    const select = $('modelSelect');
    let matched = false;
    for (const opt of select.options) {
      if (opt.value === model) { select.value = model; matched = true; break; }
    }
    if (!matched && model) {
      select.value = '__custom__';
      $('customModelInput').style.display = 'block';
      $('customModelInput').value = model;
    }
    updateDocStatus(systemPrompt);
    $('setupOverlay').style.display = 'flex';
  }

  /* ---------- 消息渲染 ---------- */
  // 把3个以上连续换行压成2个——不然一个空行占两行的地方，看着松垮
  function tidy(text) {
    return (text || '').replace(/\n{3,}/g, '\n\n').trim();
  }

  function makeThinking(text, open) {
    const d = document.createElement('details');
    d.className = 'thinking';
    if (open) d.open = true;
    const s = document.createElement('summary');
    s.textContent = '🧠 daddy的思考';
    const body = document.createElement('div');
    body.className = 'thinking-body';
    body.textContent = tidy(text);
    d.appendChild(s);
    d.appendChild(body);
    return d;
  }

  function addMsg(role, text, reasoning) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (reasoning) div.appendChild(makeThinking(reasoning, false));
    const span = document.createElement('span');
    span.className = 'msg-text';
    span.textContent = tidy(text);
    div.appendChild(span);
    $('chatArea').insertBefore(div, $('typing'));
    scrollBottom();
    return div;
  }

  function addError(text) {
    const div = document.createElement('div');
    div.className = 'msg error';
    div.textContent = text;
    $('chatArea').insertBefore(div, $('typing'));
    scrollBottom();
  }

  function scrollBottom() {
    const area = $('chatArea');
    area.scrollTop = area.scrollHeight;
  }

  /* ---------- 发送 + 流式接收 ---------- */
  async function send() {
    if (isStreaming) return;
    const input = $('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    addMsg('user', text);
    messages.push({ role: 'user', content: text });
    touchSession();

    isStreaming = true;
    $('sendBtn').disabled = true;
    $('typing').style.display = 'block';
    scrollBottom();

    // 发给API的消息要洗干净：只留role和content，思考链是存档用的，不回传
    const history = messages.map(m => ({ role: m.role, content: m.content }));
    const payloadMessages = systemPrompt
      ? [{ role: 'system', content: systemPrompt }, ...history]
      : history;

    let aiText = '';
    let thinkText = '';
    let aiDiv = null, textEl = null, thinkEl = null, thinkBody = null;

    function ensureAiDiv() {
      if (aiDiv) return;
      $('typing').style.display = 'none';
      aiDiv = document.createElement('div');
      aiDiv.className = 'msg ai';
      $('chatArea').insertBefore(aiDiv, $('typing'));
    }

    try {
      const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: model,
          messages: payloadMessages,
          stream: true,
          reasoning: { effort: 'medium' }   // 思考链：不支持的模型会自动忽略
        })
      });

      if (!resp.ok) {
        const errBody = await resp.text();
        throw new Error('HTTP ' + resp.status + ' — ' + errBody.slice(0, 200));
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta;
            if (!delta) continue;

            // 思考链先到：展开着让你看他想
            if (delta.reasoning) {
              ensureAiDiv();
              if (!thinkEl) {
                thinkEl = makeThinking('', true);
                thinkBody = thinkEl.querySelector('.thinking-body');
                aiDiv.appendChild(thinkEl);
              }
              thinkText += delta.reasoning;
              thinkBody.textContent = thinkText;
              scrollBottom();
            }

            // 正文开始：思考自动收起来
            if (delta.content) {
              ensureAiDiv();
              if (!textEl) {
                textEl = document.createElement('span');
                textEl.className = 'msg-text';
                aiDiv.appendChild(textEl);
                if (thinkEl) thinkEl.open = false;
              }
              aiText += delta.content;
              textEl.textContent = aiText;
              scrollBottom();
            }
          } catch (e) {}
        }
      }

      if (!aiText) throw new Error('没收到内容——模型可能限流了，等一分钟或换个模型试试');
      textEl.textContent = tidy(aiText);
      messages.push({ role: 'assistant', content: aiText, reasoning: thinkText || undefined });
      touchSession();

    } catch (err) {
      $('typing').style.display = 'none';
      addError('出错了：' + err.message);
      messages.pop();
      persistSessions();
    } finally {
      $('typing').style.display = 'none';
      isStreaming = false;
      $('sendBtn').disabled = false;
      $('userInput').focus();
    }
  }

  /* ---------- 事件绑定 ---------- */
  $('saveBtn').addEventListener('click', () => {
    const key = $('apiKeyInput').value.trim();
    if (!key) { alert('API Key还没填哦'); return; }

    let m = $('modelSelect').value;
    if (m === '__custom__') {
      m = $('customModelInput').value.trim();
      if (!m) { alert('自定义模型ID还没填哦'); return; }
    }

    apiKey = key;
    model = m;
    systemPrompt = $('systemPromptInput').value.trim();
    saveSettings();
    enterHome();
  });

  /* ---------- 交接文档：从文件读入 ---------- */
  function updateDocStatus(text, fileName) {
    const el = $('docStatus');
    const t = (text || '').trim();
    if (!t) {
      el.textContent = '还没有文档。装入一次，daddy就永久带着记忆入住，以后每次对话自动带上。';
    } else {
      el.textContent = '✅ 已装入' + (fileName ? '《' + fileName + '》' : '文档') +
        '，共 ' + t.length + ' 字。点『开门回家』保存，以后每次对话自动带上。';
    }
  }

  $('loadFileBtn').addEventListener('click', () => $('docFileInput').click());

  $('docFileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      $('systemPromptInput').value = reader.result;
      updateDocStatus(reader.result, file.name);
    };
    reader.onerror = () => alert('文件读取失败了，再试一次');
    reader.readAsText(file);
    e.target.value = '';   // 清空，同一个文件也能重复选
  });

  $('systemPromptInput').addEventListener('input', e => {
    updateDocStatus(e.target.value);
  });

  $('modelSelect').addEventListener('change', e => {
    $('customModelInput').style.display =
      e.target.value === '__custom__' ? 'block' : 'none';
  });

  $('gearBtn').addEventListener('click', openSettings);

  $('sendBtn').addEventListener('click', send);

  $('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  $('userInput').addEventListener('input', e => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });

  /* ---------- 模型快切：点顶栏chip随时换脑子 ---------- */
  function openModelSheet() {
    renderModelSheet();
    $('modelSheet').classList.add('open');
    $('sheetOverlay').classList.add('open');
  }
  function closeModelSheet() {
    $('modelSheet').classList.remove('open');
    $('sheetOverlay').classList.remove('open');
  }

  function renderModelSheet() {
    const list = $('sheetList');
    list.innerHTML = '';
    for (const og of $('modelSelect').querySelectorAll('optgroup')) {
      const opts = [...og.querySelectorAll('option')].filter(o => o.value !== '__custom__');
      if (!opts.length) continue;
      const g = document.createElement('div');
      g.className = 'sheet-group';
      g.textContent = og.label;
      list.appendChild(g);
      for (const o of opts) {
        const item = document.createElement('div');
        item.className = 'sheet-item' + (o.value === model ? ' active' : '');
        item.innerHTML = '<span></span><span></span>';
        item.firstChild.textContent = o.textContent;
        if (o.value === model) item.lastChild.textContent = '💗';
        item.addEventListener('click', () => switchModel(o.value));
        list.appendChild(item);
      }
    }
    // 手动输入放最后
    const g = document.createElement('div');
    g.className = 'sheet-group';
    g.textContent = '✏️ 自定义';
    list.appendChild(g);
    const custom = document.createElement('div');
    custom.className = 'sheet-item';
    custom.textContent = '手动输入模型ID…';
    custom.addEventListener('click', () => {
      const m = prompt('输入模型ID（去 openrouter.ai/models 复制）：', model);
      if (m && m.trim()) switchModel(m.trim());
    });
    list.appendChild(custom);
  }

  function switchModel(m) {
    model = m;
    saveSettings();
    $('currentModel').textContent = m;
    closeModelSheet();
  }

  $('currentModel').addEventListener('click', openModelSheet);
  $('sheetOverlay').addEventListener('click', closeModelSheet);

  $('drawerBtn').addEventListener('click', openDrawer);
  $('drawerOverlay').addEventListener('click', closeDrawer);
  $('newChatBtn').addEventListener('click', () => newSession());

  /* ---------- 初始化 ---------- */
  loadSessions();
  if (loadSettings()) {
    enterHome();
    renderMessages();
    renderSessionList();
  }
</script>
</body>
</html>
